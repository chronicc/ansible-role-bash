---
nebula_enable: yes
nebula_lighthouse_serve_dns: "{{ undef() }}" # @type: bool
nebula_lighthouse_dns_host: "{{ undef() }}" # @type: string
nebula_lighthouse_dns_port: "{{ undef() }}" # @type: int
nebula_lighthouse_interval: 60
nebula_version: latest
nebula_static_hostmap: {}
nebula_static_cadence: 30s
nebula_static_network: ip4
nebula_static_lookup_timeout: 250ms
nebula_config_dir: /etc/nebula
nebula_config_file: config.yml
nebula_certs_dir: "{{ nebula_config_dir }}/certs"

nebula_revoked_certs_dir: "{{ nebula_ca_certs_dir }}/revoked_certs"
nebula_target: install # @type: enum['install', 'revoke', 'renew']
nebula_bin_dir: /usr/local/bin
nebula_arch: amd64
nebula_download_dir: /opt
nebula_download_url: "https://github.com/slackhq/nebula/releases/download/{{ nebula_version }}/nebula-linux-{{ nebula_arch }}.tar.gz"
nebula_checksum: ""
nebula_checksum_url: "https://github.com/slackhq/nebula/releases/download/{{ nebula_version }}/SHASUM256.txt"
nebula_checksum_algorithm: sha256
nebula_disconnect_invalid: "{{ undef() }}" # @type: bool

# Blocklist
nebula_auto_revoke: yes # automatically revoke certificates that are not in the host map
nebula_blocklist: []

# Certificate Renewal
nebula_auto_renew: yes
nebula_renew_before: 3d

nebula_is_lighthouse: no
nebula_is_ca: no

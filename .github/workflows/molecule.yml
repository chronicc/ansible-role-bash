name: molecule

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  molecule:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distribution:
          - almalinux/8
          - almalinux/9
          - generic/debian11
          - generic/debian12
          - generic/ubuntu2004
          - generic/ubuntu2204
    steps:
      - uses: actions/checkout@v3

      - uses: gofrolist/molecule-action@v2
        env:
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: '${{ matrix.distribution }}'
